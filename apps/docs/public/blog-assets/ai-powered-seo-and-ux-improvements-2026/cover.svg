<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020009"/>
      <stop offset="30%" stop-color="#0a0020"/>
      <stop offset="60%" stop-color="#05001a"/>
      <stop offset="100%" stop-color="#000810"/>
    </linearGradient>

    <radialGradient id="nebula1" cx="0.3" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="0.7" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#0ea5e9" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="0.5" cy="0.8" r="0.4">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="star-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#fff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <filter id="warp" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="42" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="tightglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="wideglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>

    <!-- Wormhole rings gradient -->
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Void -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Nebula clouds -->
  <rect width="1200" height="630" fill="url(#nebula1)"/>
  <rect width="1200" height="630" fill="url(#nebula2)"/>
  <rect width="1200" height="630" fill="url(#nebula3)"/>

  <!-- Warped nebula streaks -->
  <g filter="url(#warp)" opacity="0.4">
    <ellipse cx="350" cy="280" rx="300" ry="120" fill="#7c3aed" opacity="0.08" filter="url(#softglow)"/>
    <ellipse cx="850" cy="350" rx="250" ry="80" fill="#06b6d4" opacity="0.06" filter="url(#softglow)"/>
    <ellipse cx="600" cy="500" rx="400" ry="60" fill="#d946ef" opacity="0.04" filter="url(#softglow)"/>
  </g>

  <!-- Star field -->
  <g opacity="0.7">
    <circle cx="89" cy="45" r="0.8" fill="#fff"/><circle cx="234" cy="78" r="0.5" fill="#fff"/>
    <circle cx="456" cy="32" r="1" fill="#fff"/><circle cx="678" cy="67" r="0.6" fill="#fff"/>
    <circle cx="890" cy="23" r="0.7" fill="#fff"/><circle cx="1045" cy="89" r="0.9" fill="#fff"/>
    <circle cx="123" cy="156" r="0.4" fill="#fff"/><circle cx="345" cy="189" r="0.7" fill="#fff"/>
    <circle cx="567" cy="134" r="0.5" fill="#fff"/><circle cx="789" cy="178" r="0.8" fill="#fff"/>
    <circle cx="1012" cy="145" r="0.6" fill="#fff"/><circle cx="1134" cy="167" r="0.4" fill="#fff"/>
    <circle cx="67" cy="289" r="0.6" fill="#fff"/><circle cx="198" cy="345" r="0.9" fill="#fff"/>
    <circle cx="912" cy="267" r="0.5" fill="#fff"/><circle cx="1078" cy="312" r="0.7" fill="#fff"/>
    <circle cx="45" cy="456" r="0.8" fill="#fff"/><circle cx="234" cy="512" r="0.5" fill="#fff"/>
    <circle cx="890" cy="489" r="0.6" fill="#fff"/><circle cx="1123" cy="445" r="0.9" fill="#fff"/>
    <circle cx="78" cy="567" r="0.7" fill="#fff"/><circle cx="345" cy="589" r="0.4" fill="#fff"/>
    <circle cx="678" cy="578" r="0.8" fill="#fff"/><circle cx="1056" cy="556" r="0.5" fill="#fff"/>
    <circle cx="456" cy="423" r="0.3" fill="#c4b5fd"/><circle cx="734" cy="456" r="0.4" fill="#67e8f9"/>
    <circle cx="156" cy="234" r="0.3" fill="#fde68a"/><circle cx="934" cy="134" r="0.3" fill="#c4b5fd"/>
  </g>

  <!-- Bright stars with glow -->
  <circle cx="180" cy="120" r="8" fill="url(#star-glow)" opacity="0.5"/>
  <circle cx="180" cy="120" r="1.5" fill="#fff"/>
  <circle cx="1020" cy="200" r="6" fill="url(#star-glow)" opacity="0.4"/>
  <circle cx="1020" cy="200" r="1.2" fill="#fff"/>
  <circle cx="950" cy="520" r="7" fill="url(#star-glow)" opacity="0.3"/>
  <circle cx="950" cy="520" r="1.3" fill="#e9d5ff"/>

  <!-- === WORMHOLE / PORTAL === -->
  <g transform="translate(600, 280)">
    <!-- Deep space glow behind portal -->
    <circle cx="0" cy="0" r="160" fill="#d946ef" opacity="0.04" filter="url(#wideglow)"/>
    <circle cx="0" cy="0" r="100" fill="#06b6d4" opacity="0.06" filter="url(#wideglow)"/>

    <!-- Outer distortion rings -->
    <ellipse cx="0" cy="0" rx="155" ry="62" stroke="#d946ef" stroke-width="0.5" fill="none" opacity="0.15" transform="rotate(-15)">
      <animateTransform attributeName="transform" type="rotate" from="-15" to="345" dur="25s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="140" ry="55" stroke="#06b6d4" stroke-width="0.4" fill="none" opacity="0.12" transform="rotate(30)" stroke-dasharray="8 12">
      <animateTransform attributeName="transform" type="rotate" from="30" to="-330" dur="20s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="125" ry="48" stroke="#fbbf24" stroke-width="0.3" fill="none" opacity="0.1" transform="rotate(-45)" stroke-dasharray="4 16">
      <animateTransform attributeName="transform" type="rotate" from="-45" to="315" dur="18s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Inner portal rings -->
    <ellipse cx="0" cy="0" rx="95" ry="38" stroke="#d946ef" stroke-width="0.8" fill="none" opacity="0.25" transform="rotate(10)">
      <animateTransform attributeName="transform" type="rotate" from="10" to="370" dur="12s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="75" ry="30" stroke="#06b6d4" stroke-width="0.6" fill="none" opacity="0.3" transform="rotate(-25)">
      <animateTransform attributeName="transform" type="rotate" from="-25" to="-385" dur="9s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="55" ry="22" stroke="#e879f9" stroke-width="0.5" fill="none" opacity="0.35" transform="rotate(40)" stroke-dasharray="3 5">
      <animateTransform attributeName="transform" type="rotate" from="40" to="400" dur="7s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Portal core — bright singularity -->
    <circle cx="0" cy="0" r="30" fill="#7c3aed" opacity="0.15" filter="url(#softglow)"/>
    <circle cx="0" cy="0" r="15" fill="#c084fc" opacity="0.2" filter="url(#tightglow)"/>
    <circle cx="0" cy="0" r="6" fill="#e9d5ff" opacity="0.5" filter="url(#tightglow)"/>
    <circle cx="0" cy="0" r="2.5" fill="#fff" opacity="0.9"/>

    <!-- Light rays from singularity -->
    <g opacity="0.08">
      <line x1="0" y1="0" x2="-200" y2="-80" stroke="#d946ef" stroke-width="1"/>
      <line x1="0" y1="0" x2="180" y2="-100" stroke="#06b6d4" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="-160" y2="90" stroke="#fbbf24" stroke-width="0.6"/>
      <line x1="0" y1="0" x2="220" y2="60" stroke="#d946ef" stroke-width="0.7"/>
      <line x1="0" y1="0" x2="50" y2="-130" stroke="#e879f9" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="-30" y2="120" stroke="#06b6d4" stroke-width="0.5"/>
    </g>

    <!-- Particles spiraling in -->
    <circle r="2" fill="#06b6d4" opacity="0.8">
      <animateMotion dur="4s" repeatCount="indefinite" path="M120,0 A120,48 0 0,1 -120,0 A120,48 0 0,1 120,0" keyPoints="0;1" keyTimes="0;1"/>
      <animate attributeName="r" values="2;0.5;2" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#d946ef" opacity="0.7">
      <animateMotion dur="3.5s" repeatCount="indefinite" path="M-90,35 A90,35 0 0,0 90,-35 A90,35 0 0,0 -90,35" keyPoints="0;1" keyTimes="0;1"/>
      <animate attributeName="r" values="1.5;0.3;1.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.8" fill="#fbbf24" opacity="0.6">
      <animateMotion dur="5s" repeatCount="indefinite" path="M60,-20 A60,24 0 0,1 -60,20 A60,24 0 0,1 60,-20" keyPoints="0;1" keyTimes="0;1" begin="1s"/>
    </circle>
    <circle r="1" fill="#e879f9" opacity="0.5">
      <animateMotion dur="3s" repeatCount="indefinite" path="M40,15 A40,16 0 0,0 -40,-15 A40,16 0 0,0 40,15" keyPoints="0;1" keyTimes="0;1" begin="0.5s"/>
    </circle>

    <!-- Pulsing energy waves -->
    <ellipse cx="0" cy="0" rx="30" ry="12" stroke="#d946ef" stroke-width="0.5" fill="none">
      <animate attributeName="rx" values="30;110;30" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="12;44;12" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="25" ry="10" stroke="#06b6d4" stroke-width="0.4" fill="none">
      <animate attributeName="rx" values="25;100;25" dur="5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="10;40;10" dur="5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="5s" begin="1.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- === DATA STREAMS flowing into portal === -->
  <!-- Left side: code fragments dissolving -->
  <g opacity="0.12" font-family="'SF Mono','Fira Code',monospace" font-size="10">
    <text x="30" y="200" fill="#06b6d4">generateMetadata()</text>
    <text x="60" y="220" fill="#d946ef">BreadcrumbList</text>
    <text x="20" y="245" fill="#fbbf24">initialData: ssr</text>
    <text x="50" y="340" fill="#06b6d4">llms.txt</text>
    <text x="30" y="365" fill="#e879f9">splitNumber: 4</text>
    <text x="70" y="390" fill="#fbbf24">onComplete()</text>
  </g>
  <!-- Right side -->
  <g opacity="0.12" font-family="'SF Mono','Fira Code',monospace" font-size="10">
    <text x="1010" y="195" fill="#d946ef" text-anchor="end">MCP server</text>
    <text x="1050" y="220" fill="#06b6d4" text-anchor="end">agent endpoints</text>
    <text x="1020" y="250" fill="#fbbf24" text-anchor="end">AI code tracking</text>
    <text x="1040" y="340" fill="#e879f9" text-anchor="end">ecosystem insights</text>
    <text x="1010" y="365" fill="#06b6d4" text-anchor="end">real-time events</text>
    <text x="1060" y="390" fill="#d946ef" text-anchor="end">structured data</text>
  </g>

  <!-- Fading connection lines from text to portal -->
  <g opacity="0.04" stroke-width="0.5">
    <line x1="200" y1="200" x2="500" y2="270" stroke="#06b6d4"/>
    <line x1="180" y1="340" x2="500" y2="290" stroke="#fbbf24"/>
    <line x1="1000" y1="200" x2="700" y2="270" stroke="#d946ef"/>
    <line x1="1020" y1="350" x2="700" y2="290" stroke="#06b6d4"/>
  </g>

  <!-- === TITLE === -->
  <!-- Title glow layer -->
  <text x="600" y="498" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="42" font-weight="900" fill="#d946ef" filter="url(#tightglow)" opacity="0.4" letter-spacing="-1">
    Rebuilding OSSInsight
  </text>
  <!-- Title solid layer -->
  <text x="600" y="498" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="42" font-weight="900" fill="#f0f0f8" letter-spacing="-1">
    Rebuilding OSSInsight
  </text>

  <!-- Subtitle -->
  <text x="600" y="536" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#a78bfa" letter-spacing="1" font-weight="300">
    from Docusaurus to Next.js — powered by AI
  </text>

  <!-- Floating badge -->
  <g transform="translate(510, 564)">
    <rect x="0" y="0" width="180" height="30" rx="15" fill="#d946ef" fill-opacity="0.08" stroke="#d946ef" stroke-opacity="0.2" stroke-width="0.8"/>
    <text x="90" y="20" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#e9d5ff" font-weight="500" letter-spacing="0.5">
      built by Claude Code
    </text>
  </g>
</svg>
