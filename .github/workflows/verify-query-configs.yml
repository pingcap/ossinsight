name: Verify Query Configs

on:
  pull_request:
    paths:
      - 'configs/queries/**'
      - 'src/shared/types/**'

defaults:
  run:
    shell: bash
    working-directory: src/shared/types

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        working-directory: .
        run: npm install

      - name: Verify Query Definition
        run: npm run validate:query
